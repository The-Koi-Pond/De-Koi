services:
  de-koi-server:
    image: ghcr.io/the-koi-pond/de-koi-server:prealpha
    container_name: de-koi-server
    restart: unless-stopped
    environment:
      DE_KOI_SERVER_ADDR: 0.0.0.0:8787
      DE_KOI_DATA_DIR: /data
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-/data/claude-config}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://pi:7860,http://pi.local:7860}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://pi:7860,http://pi.local:7860}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
      IP_ALLOWLIST: ${IP_ALLOWLIST:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
    expose:
      - "8787"
    volumes:
      - ${DE_KOI_HOST_DATA_DIR:-de-koi-server-data}:/data

  de-koi-web:
    image: ghcr.io/the-koi-pond/de-koi-web:prealpha
    container_name: de-koi-web
    restart: unless-stopped
    depends_on:
      - de-koi-server
    ports:
      - "7860:80"

volumes:
  de-koi-server-data:
