server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    proxy_pass http://de-koi-server:8787/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /api/ {
    proxy_pass http://de-koi-server:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
