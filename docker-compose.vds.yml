services:
  de-koi-server:
    image: ghcr.io/the-koi-pond/de-koi-server:prealpha
    container_name: de-koi-server
    restart: unless-stopped
    environment:
      DE_KOI_SERVER_ADDR: 0.0.0.0:8787
      DE_KOI_DATA_DIR: /data
      # Set these to the exact browser origin users will open, for example https://de-koi.example.com.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:7860,http://localhost:7860}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:7860,http://localhost:7860}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
      IP_ALLOWLIST: ${IP_ALLOWLIST:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
    expose:
      - "8787"
    volumes:
      - ${DE_KOI_HOST_DATA_DIR:-de-koi-vds-data}:/data

  de-koi-web:
    image: ghcr.io/the-koi-pond/de-koi-web:prealpha
    container_name: de-koi-web
    restart: unless-stopped
    depends_on:
      - de-koi-server
    ports:
      - "${DE_KOI_WEB_BIND:-127.0.0.1:7860}:80"

volumes:
  de-koi-vds-data:
