services:
  de-koi-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: de-koi-server:local
    container_name: de-koi-server
    restart: unless-stopped
    environment:
      DE_KOI_SERVER_ADDR: 0.0.0.0:8787
      DE_KOI_DATA_DIR: /data
      DE_KOI_REPO_ROOT: /app
      # Claude Subscription (Pro/Max) is optional. Set CLAUDE_CODE_OAUTH_TOKEN
      # in your .env or shell env to enable the claude_subscription provider
      # without an sk-ant-* API key. Empty value is fine; the provider can still
      # use API-key auth or a credentials file in CLAUDE_CONFIG_DIR.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-/data/claude-config}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      BYPASS_AUTH_DOCKER: "true"
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ${DE_KOI_HOST_DATA_DIR:-de-koi-server-data}:/data

volumes:
  de-koi-server-data:
