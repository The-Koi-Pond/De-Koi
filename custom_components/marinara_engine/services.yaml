send_message:
  name: Send Message
  description: >
    Send a message to a Marinara Engine chat. If no chat_id is provided, the
    primary chat configured in the integration options is used.
  fields:
    chat_id:
      name: Chat ID
      description: >
        ID of the target chat. Leave blank to use the primary chat set in
        the integration options.
      required: false
      selector:
        text:
    message:
      name: Message
      description: The message content to send.
      required: true
      selector:
        text:
          multiline: true
    role:
      name: Role
      description: Message role. Defaults to "user".
      required: false
      default: user
      selector:
        select:
          options:
            - user
            - assistant
            - system
            - narrator
    trigger_generation:
      name: Trigger Generation
      description: >
        Refactor compatibility field. The hostable runtime stores the message,
        but desktop generation still happens from the Marinara app.
      required: false
      default: false
      selector:
        boolean:

trigger_generation:
  name: Trigger Generation
  description: >
    Refactor compatibility service. If user_message is provided, it is stored
    in the target chat. The Tauri refactor does not expose the desktop
    generation loop through marinara-server.
  fields:
    chat_id:
      name: Chat ID
      description: >
        ID of the target chat. Leave blank to use the primary chat set in
        the integration options.
      required: false
      selector:
        text:
    user_message:
      name: User Message
      description: >
        Optional message to send from the user as part of this generation turn.
      required: false
      selector:
        text:
          multiline: true
