name: Container Images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pi-container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.2"
  REGISTRY: ghcr.io

jobs:
  main-only:
    name: Main branch guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Allow only main branch builds
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Pi container images may only be published from main. Selected branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Confirm this run is current main HEAD before building
        shell: bash
        run: |
          set -euo pipefail
          main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ "${main_sha}" != "${GITHUB_SHA}" ]; then
            echo "::error::Refusing to build obsolete Pi images. main is ${main_sha}; this run is ${GITHUB_SHA}."
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: main-only
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: de-koi-server
            image: ghcr.io/the-koi-pond/de-koi-server
            dockerfile: Dockerfile
          - name: de-koi-web
            image: ghcr.io/the-koi-pond/de-koi-web
            dockerfile: Dockerfile.web
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          {
            echo "version=${version}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=raw,value=v${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.source=https://github.com/The-Koi-Pond/De-Koi
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DE_KOI_IMAGE_VERSION=${{ steps.version.outputs.version }}
            DE_KOI_SOURCE_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=pi-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=pi-${{ matrix.name }}
  promote-prealpha:
    name: Promote prealpha image batch
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Confirm this run is still main HEAD
        shell: bash
        run: |
          set -euo pipefail
          main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ "${main_sha}" != "${GITHUB_SHA}" ]; then
            echo "::error::Refusing to promote an obsolete Pi image batch. main is ${main_sha}; this run is ${GITHUB_SHA}."
            exit 1
          fi

      - name: Compute short SHA
        id: version
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote matched server and web images
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${{ steps.version.outputs.short_sha }}"
          docker buildx imagetools create \
            --tag ghcr.io/the-koi-pond/de-koi-server:prealpha \
            ghcr.io/the-koi-pond/de-koi-server:sha-${short_sha}
          docker buildx imagetools create \
            --tag ghcr.io/the-koi-pond/de-koi-web:prealpha \
            ghcr.io/the-koi-pond/de-koi-web:sha-${short_sha}
