name: CI Sanity

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity Checks
    runs-on: ${{ fromJSON(vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:line-endings
      - run: pnpm check:architecture
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:allow-empty
      - run: pnpm build
