name: CI Full

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  schedule:
    - cron: "17 9 * * 1,4"
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Change Classification
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.classify.outputs.frontend }}
      rust: ${{ steps.classify.outputs.rust }}
      browser: ${{ steps.classify.outputs.browser }}
      docs: ${{ steps.classify.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "frontend=true"
              echo "rust=true"
              echo "browser=true"
              echo "docs=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
            BASE="$(git rev-parse "${HEAD}^" 2>/dev/null || true)"
          fi

          if [ -z "$BASE" ] || ! git diff --name-only "$BASE" "$HEAD" > changed-files.txt; then
            echo "Unable to determine a precise diff; running all CI lanes."
            {
              echo "frontend=true"
              echo "rust=true"
              echo "browser=true"
              echo "docs=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          sed 's/^/- /' changed-files.txt

          matches() {
            grep -Eq "$1" changed-files.txt
          }

          broad=false
          frontend=false
          rust=false
          browser=false
          docs=false

          if matches '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig(\.node)?\.json|vite\.config\.ts|vitest\.config\.ts|eslint\.config\.js|playwright\.config\.ts|lighthouserc\.cjs|knip\.json|rust-toolchain\.toml|deny\.toml|\.github/workflows/(ci-full|ci-sanity)\.yml|scripts/(run-vite|check-[^/]+|eslint-full-report)\.mjs)$'; then
            broad=true
          fi

          if matches '^(src/|tests/unit/|public/|scripts/|index\.html$|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$|tsconfig(\.node)?\.json$|vite\.config\.ts$|vitest\.config\.ts$|eslint\.config\.js$|lighthouserc\.cjs$|knip\.json$)'; then
            frontend=true
          fi

          if matches '^(src-tauri/|deny\.toml|rust-toolchain\.toml|src/shared/api/|src/engine/contracts/)'; then
            rust=true
          fi

          if matches '^(src/app/|src/features/|src/shared/|src/styles/|public/|tests/e2e/|playwright\.config\.ts$|vite\.config\.ts$|index\.html$|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$)'; then
            browser=true
          fi

          if matches '^(AGENTS\.md$|CONTRIBUTING\.md$|README\.md$|docs/|skills/|\.github/agents/|\.github/bunny-review/|\.github/pull_request_template\.md$|scripts/check-(docs|discovery-metadata|workflow-names|scratch-clean|line-endings)\.mjs$)'; then
            docs=true
          fi

          if [ "$broad" = true ]; then
            frontend=true
            rust=true
            browser=true
            docs=true
          fi

          {
            echo "frontend=$frontend"
            echo "rust=$rust"
            echo "browser=$browser"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend, Architecture, and Organization
    needs: classify
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (needs.classify.outputs.frontend == 'true' || needs.classify.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Workflow metadata name check
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: pnpm check:workflow-names
      - run: pnpm check:line-endings
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm check:architecture
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm lint
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm typecheck
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm test:allow-empty
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm build
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm perf:size
      - if: needs.classify.outputs.docs == 'true'
        run: pnpm check:docs
      - name: Discovery metadata warning
        if: needs.classify.outputs.frontend == 'true' || needs.classify.outputs.docs == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm check:discovery -- --pr-aware --warn-only
          else
            pnpm check:discovery -- --warn-only
          fi
      - name: Unused code report
        if: needs.classify.outputs.frontend == 'true'
        run: pnpm check:unused

  rust:
    name: Rust Capability Layer
    needs: classify
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.classify.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-deny,cargo-machete
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: cargo check --manifest-path src-tauri/Cargo.toml --workspace
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings -A dead_code
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml --workspace
      - name: Rust dependency policy report
        run: cargo deny --manifest-path src-tauri/Cargo.toml check --config deny.toml
        continue-on-error: true
      - name: Unused Rust dependency report
        run: cargo machete src-tauri
        continue-on-error: true

  smoke:
    name: Browser Smoke and Performance
    needs:
      - classify
      - frontend
    if: >
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.classify.outputs.browser == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:ui:run
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
