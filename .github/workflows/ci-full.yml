name: CI Full

# Repo-variable toggles:
# - DE_KOI_PR_SYNC_AUTOMATION=off skips full CI lanes for PR synchronize events.
# - DE_KOI_CI_FULL_MODE=full runs all full CI lanes instead of file classification.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "17 9 * * 1,4"
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Change Classification
    runs-on: ${{ fromJSON(vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    outputs:
      frontend: ${{ steps.non_pr.outputs.frontend || steps.sync_off.outputs.frontend || steps.full_mode.outputs.frontend || steps.classify.outputs.frontend }}
      rust: ${{ steps.non_pr.outputs.rust || steps.sync_off.outputs.rust || steps.full_mode.outputs.rust || steps.classify.outputs.rust }}
      browser: ${{ steps.non_pr.outputs.browser || steps.sync_off.outputs.browser || steps.full_mode.outputs.browser || steps.classify.outputs.browser }}
      docs: ${{ steps.non_pr.outputs.docs || steps.sync_off.outputs.docs || steps.full_mode.outputs.docs || steps.classify.outputs.docs }}
    steps:
      - id: non_pr
        name: Route non-PR event
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          {
            echo "frontend=true"
            echo "rust=true"
            echo "browser=true"
            echo "docs=true"
          } >> "$GITHUB_OUTPUT"

      - id: sync_off
        name: Route disabled PR update
        if: github.event_name == 'pull_request' && github.event.action == 'synchronize' && vars.DE_KOI_PR_SYNC_AUTOMATION == 'off'
        shell: bash
        run: |
          echo "DE_KOI_PR_SYNC_AUTOMATION=off; skipping full CI lanes for this PR update."
          {
            echo "frontend=false"
            echo "rust=false"
            echo "browser=false"
            echo "docs=false"
          } >> "$GITHUB_OUTPUT"

      - id: full_mode
        name: Route full CI mode
        if: github.event_name == 'pull_request' && (vars.DE_KOI_CI_FULL_MODE == 'full' || vars.DE_KOI_CI_FULL_MODE == 'all')
        shell: bash
        run: |
          echo "DE_KOI_CI_FULL_MODE=${{ vars.DE_KOI_CI_FULL_MODE }}; running all full CI lanes."
          {
            echo "frontend=true"
            echo "rust=true"
            echo "browser=true"
            echo "docs=true"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: >
          github.event_name == 'pull_request' &&
          !(github.event.action == 'synchronize' && vars.DE_KOI_PR_SYNC_AUTOMATION == 'off') &&
          vars.DE_KOI_CI_FULL_MODE != 'full' &&
          vars.DE_KOI_CI_FULL_MODE != 'all'
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        name: Classify changed files
        if: >
          github.event_name == 'pull_request' &&
          !(github.event.action == 'synchronize' && vars.DE_KOI_PR_SYNC_AUTOMATION == 'off') &&
          vars.DE_KOI_CI_FULL_MODE != 'full' &&
          vars.DE_KOI_CI_FULL_MODE != 'all'
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
            BASE="$(git rev-parse "${HEAD}^" 2>/dev/null || true)"
          fi

          if [ -z "$BASE" ] || ! git diff --name-only "$BASE" "$HEAD" > changed-files.txt; then
            echo "Unable to determine a precise diff; running all CI lanes."
            {
              echo "frontend=true"
              echo "rust=true"
              echo "browser=true"
              echo "docs=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          sed 's/^/- /' changed-files.txt

          matches() {
            grep -Eq "$1" changed-files.txt
          }

          broad=false
          frontend=false
          rust=false
          browser=false
          docs=false

          # Full circus: dependency, workflow, build config, and cross-boundary
          # changes are cheap to classify but expensive to get wrong.
          if matches '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig(\.node)?\.json|vite\.config\.ts|vitest\.config\.ts|eslint\.config\.js|playwright\.config\.ts|lighthouserc\.cjs|knip\.json|rust-toolchain\.toml|deny\.toml|\.github/workflows/[^/]+\.yml|scripts/(run-vite|check-[^/]+|eslint-full-report)\.mjs)$'; then
            broad=true
          fi

          if matches '^(src-tauri/src/(commands/storage|http_(dispatch|server)|state)|src-tauri/crates/(assets|security)|src/engine/(agents-runtime|contracts|generation)/|src/shared/api/(agent|avatar|export|game|image-generation|import|integration-utility|local-file|lorebook-command|remote-runtime|storage|tracker-snapshot)-api\.ts|custom_components/)'; then
            broad=true
          fi

          if matches '^(src/(app|engine|features|shared|styles)/|src/[^/]+\.(ts|tsx|d\.ts|css)$|tests/unit/|public/|scripts/|index\.html$|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$|tsconfig(\.node)?\.json$|vite\.config\.ts$|vitest\.config\.ts$|eslint\.config\.js$|lighthouserc\.cjs$|knip\.json$)'; then
            frontend=true
          fi

          if matches '^(src-tauri/|deny\.toml|rust-toolchain\.toml|src/shared/api/|src/engine/contracts/)'; then
            rust=true
          fi

          if matches '^(src/app/|src/features/|src/styles/|src/shared/(api/[^/]+-api\.ts|lib/(notification-sound|text-blip-sound)\.ts|stores/ui|types/)|public/|tests/e2e/|playwright\.config\.ts$|vite\.config\.ts$|index\.html$|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$)'; then
            browser=true
          fi

          if matches '^(AGENTS\.md$|CONTRIBUTING\.md$|README\.md$|docs/|skills/|\.agents/|\.github/agents/|\.github/bunny-review/|\.github/pull_request_template\.md$|scripts/check-(docs|agent-workflow|discovery-metadata|workflow-names|scratch-clean|line-endings)\.mjs$)'; then
            docs=true
          fi

          if [ "$broad" = true ]; then
            frontend=true
            rust=true
            browser=true
            docs=true
          fi

          {
            echo "frontend=$frontend"
            echo "rust=$rust"
            echo "browser=$browser"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend, Architecture, and Organization
    needs: classify
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (needs.classify.outputs.frontend == 'true' || needs.classify.outputs.docs == 'true')
    runs-on: ${{ fromJSON(vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Reset self-hosted pnpm tool home
        if: runner.environment != 'github-hosted'
        run: rm -rf "$HOME/setup-pnpm"
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - name: Set up Node with pnpm cache
        if: runner.environment == 'github-hosted'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Set up Node without pnpm cache
        if: runner.environment != 'github-hosted'
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Workflow metadata name check
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: pnpm check:workflow-names
      - run: pnpm check:line-endings
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm check:architecture
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm lint
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm typecheck
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm test:allow-empty
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm build
      - if: needs.classify.outputs.frontend == 'true'
        run: pnpm perf:size
      - if: needs.classify.outputs.docs == 'true'
        run: pnpm check:docs
      - name: Discovery metadata warning
        if: needs.classify.outputs.frontend == 'true' || needs.classify.outputs.docs == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm check:discovery -- --pr-aware --warn-only
          else
            pnpm check:discovery -- --warn-only
          fi
      - name: Unused code report
        if: needs.classify.outputs.frontend == 'true'
        run: pnpm check:unused

  rust:
    name: Rust Capability Layer
    needs: classify
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.classify.outputs.rust == 'true'
    runs-on: ${{ fromJSON(vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-deny,cargo-machete
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: cargo check --manifest-path src-tauri/Cargo.toml --workspace
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings -A dead_code
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml --workspace
      - name: Rust dependency policy report
        run: cargo deny --manifest-path src-tauri/Cargo.toml check --config deny.toml
        continue-on-error: true
      - name: Unused Rust dependency report
        run: cargo machete src-tauri
        continue-on-error: true

  smoke:
    name: Browser Smoke and Performance
    needs:
      - classify
      - frontend
    if: >
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.classify.outputs.browser == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    runs-on: ${{ fromJSON(vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v6
      - name: Reset self-hosted pnpm tool home
        if: runner.environment != 'github-hosted'
        run: rm -rf "$HOME/setup-pnpm"
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - name: Set up Node with pnpm cache
        if: runner.environment == 'github-hosted'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Set up Node without pnpm cache
        if: runner.environment != 'github-hosted'
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:ui:run
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
