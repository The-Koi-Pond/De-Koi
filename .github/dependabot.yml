# Dependabot configuration for De-Koi
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
multi-ecosystem-groups:
  routine-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 1

updates:
  # pnpm workspace (root package.json + pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    multi-ecosystem-group: "routine-dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7

  # Rust / Cargo workspace (Tauri backend)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    multi-ecosystem-group: "routine-dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "routine-dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7

  # Dockerfile base images
  - package-ecosystem: "docker"
    directory: "/"
    multi-ecosystem-group: "routine-dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7

  # Python tooling for bunny-review
  - package-ecosystem: "pip"
    directory: "/.github/bunny-review"
    multi-ecosystem-group: "routine-dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7
